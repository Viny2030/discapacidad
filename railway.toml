[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.environmentVariables]]
name = "PYTHONUNBUFFERED"
value = "1"

[[deploy.environmentVariables]]
name = "ENVIRONMENT"
value = "production"