name: ETL Estadístico semanal

on:
  schedule:
    # Todos los lunes a las 06:00 UTC (03:00 Argentina)
    - cron: "0 6 * * 1"
  workflow_dispatch:  # permite correrlo manualmente desde GitHub Actions

jobs:
  etl-estadistico:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Crear directorios de datos
        run: mkdir -p data/raw data/processed

      - name: Correr ETL estadístico
        run: python -c "
from scripts.etl_estadistico import run_etl_estadistico
import json
resultado = run_etl_estadistico()
print(json.dumps(resultado['resumen'], indent=2, ensure_ascii=False))
"

      - name: Verificar archivos generados
        run: |
          echo "=== Archivos procesados ==="
          ls -lh data/processed/ || echo "Sin archivos procesados"
          echo "=== Archivos raw ==="
          ls -lh data/raw/ || echo "Sin archivos raw"
          # Falla si no se generó el CSV principal
          test -f data/processed/prevalencia_provincias.csv || (echo "❌ prevalencia_provincias.csv no generado" && exit 1)
          echo "✅ ETL estadístico completado correctamente"

      - name: Commit y push de datos actualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Solo hace commit si hay cambios reales
          git diff --staged --quiet || git commit -m "data: ETL estadístico automático $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notificar fallo por email
        if: failure()
        run: |
          echo "ETL estadístico falló el $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Revisar logs en: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY