name: Health check diario

on:
  schedule:
    # Todos los días a las 10:00 UTC (07:00 Argentina)
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Verificar endpoint /health
        run: |
          URL="${{ secrets.RAILWAY_URL }}"
          if [ -z "$URL" ]; then
            echo "⚠️  RAILWAY_URL no configurada en secrets — saltando check de producción"
            exit 0
          fi

          echo "Chequeando $URL/health ..."
          STATUS=$(curl -s -o /tmp/health_resp.json -w "%{http_code}" "$URL/health" --max-time 15)

          echo "HTTP Status: $STATUS"
          cat /tmp/health_resp.json

          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check falló — HTTP $STATUS" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ Sitio respondiendo OK" >> $GITHUB_STEP_SUMMARY

      - name: Verificar endpoints críticos
        run: |
          URL="${{ secrets.RAILWAY_URL }}"
          if [ -z "$URL" ]; then exit 0; fi

          ENDPOINTS=(
            "/api/cud"
            "/api/cud/beneficios"
            "/api/cud/juntas"
            "/api/resumen"
            "/api/tipos"
          )

          FALLOS=0
          for EP in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL$EP" --max-time 10)
            if [ "$STATUS" = "200" ]; then
              echo "✅ $EP → $STATUS"
            else
              echo "❌ $EP → $STATUS"
              FALLOS=$((FALLOS + 1))
            fi
          done

          if [ $FALLOS -gt 0 ]; then
            echo "❌ $FALLOS endpoint(s) fallaron" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ Todos los endpoints OK" >> $GITHUB_STEP_SUMMARY